name: Generate SST Document

run-name: Generate SST for ${{ inputs.month }} ${{ inputs.year }}

on:
  workflow_dispatch:
    inputs:
      month:
        description: Month
        required: true
        type: choice
        options:
          - Jan
          - Feb
          - Mar
          - Apr
          - May
          - Jun
          - Jul
          - Aug
          - Sep
          - Oct
          - Nov
          - Dec

      year:
        description: Four-digit year
        required: true
        type: string
        default: "2026"

      previous_sst:
        description: Path to previous SST .docx file
        required: true
        type: string
        default: inputs/PIC iX_Security_Status_Table_May_2026.docx

      update_file:
        description: Path to update file (.txt or .docx)
        required: true
        type: string
        default: inputs/June2026_updates.docx

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate inputs
        shell: bash
        env:
          INPUT_YEAR: ${{ inputs.year }}
          PREVIOUS_SST: ${{ inputs.previous_sst }}
          UPDATE_FILE: ${{ inputs.update_file }}
        run: |
          if [[ ! "$INPUT_YEAR" =~ ^[0-9]{4}$ ]]; then
            echo "Error: year must contain exactly four digits."
            exit 1
          fi

          if [[ "$PREVIOUS_SST" != *.docx ]]; then
            echo "Error: previous SST must be a .docx file."
            exit 1
          fi

          if [[ "$UPDATE_FILE" != *.docx && "$UPDATE_FILE" != *.txt ]]; then
            echo "Error: update file must be a .docx or .txt file."
            exit 1
          fi

          if [[ ! -f "$PREVIOUS_SST" ]]; then
            echo "Error: previous SST file does not exist: $PREVIOUS_SST"
            exit 1
          fi

          if [[ ! -f "$UPDATE_FILE" ]]; then
            echo "Error: update file does not exist: $UPDATE_FILE"
            exit 1
          fi

      - name: Generate SST document
        env:
          SST_MONTH: ${{ inputs.month }}
          SST_YEAR: ${{ inputs.year }}
          PREVIOUS_SST_PATH: ${{ inputs.previous_sst }}
          UPDATE_FILE_PATH: ${{ inputs.update_file }}
          OUTPUT_DIRECTORY: output
        run: python src/generate_sst.py

      - name: Upload generated document
        uses: actions/upload-artifact@v4
        with:
          name: SST-${{ inputs.month }}-${{ inputs.year }}
          path: output/*.docx
          if-no-files-found: error
          retention-days: 30